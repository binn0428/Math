        // 保存當前狀態到歷史記錄
        function saveState() {
            history.push({
                shapes: shapes.map(shape => ({
                    ...shape,
                    type: shape.type,
                    x: shape.x,
                    y: shape.y,
                    width: shape.width,
                    height: shape.height,
                    name: shape.name,
                    textSize: shape.textSize,
                    lineWidth: shape.lineWidth,
                    lineColor: shape.lineColor
                })),
                connections: connections.map(conn => ({
                    start: shapes.indexOf(conn.start),
                    end: shapes.indexOf(conn.end),
                    // 確保保存完整的連線設定
                    lineWidth: conn.lineWidth !== undefined ? conn.lineWidth : lineWidth,
                    lineColor: conn.lineColor !== undefined ? conn.lineColor : lineColor
                }))
            });
        }

        // 從歷史記錄恢復狀態
        function restoreState(state) {
            shapes.length = 0;
            connections.length = 0;
            selectedShapes.length = 0;
            selectedConnections.length = 0;
            
            // 清除舊的背景圖片和設定
            bgImage = null;
            localStorage.removeItem('bgImage');
            localStorage.removeItem('bgState');
            localStorage.removeItem('bgOpacity');
            bgOpacity = 1;
            document.getElementById('bg-opacity').value = 1;

            state.shapes.forEach(shapeData => {
                const shape = new Shape(shapeData.type, shapeData.x, shapeData.y);
                shape.name = shapeData.name;
                shape.width = shapeData.width;
                shape.height = shapeData.height;
                shape.textSize = shapeData.textSize || textSize;
                shape.lineWidth = shapeData.lineWidth || lineWidth;
                shape.lineColor = shapeData.lineColor || lineColor;
                shapes.push(shape);
            });

            state.connections.forEach(connData => {
                connections.push({
                    start: shapes[connData.start],
                    end: shapes[connData.end],
                    // 確保恢復保存的線徑和顏色設定
                    lineWidth: connData.lineWidth !== undefined ? connData.lineWidth : 2,
                    lineColor: connData.lineColor !== undefined ? connData.lineColor : "#000000"
                });
            });

            redraw();
        }

        // 圖形元件類別定義
        class Shape {
            constructor(type, x, y) {
                this.type = type;       // 類型：'TB' 或 'PA'
                this.x = x;             // X 座標
                this.y = y;             // Y 座標
                const baseSize = 60;    // 基礎大小
                if (type === 'TB') {
                    this.width = baseSize;
                    this.height = baseSize;
                } else {
                    this.width = baseSize * 1.2;  // PA寬度為TB的1.2倍
                    this.height = baseSize * 0.8; // PA高度為TB的0.8倍
                }
                // 預設名稱：TB類型自動編號，PA為空
                this.name = type === 'TB' ? type + (shapes.filter(s => s.type === type).length + 1) : '';
                this.isEditing = false;
                this.textSize = textSize; // 保存文字大小
                this.lineWidth = lineWidth; // 保存線條寬度
                this.lineColor = lineColor; // 保存線條顏色
            }

            // 文字換行函數
            wrapText(text, maxWidth) {
                const words = text.split('');
                const lines = [];
                let currentLine = words[0] || '';

                for (let i = 1; i < words.length; i++) {
                    const word = words[i];
                    const width = ctx.measureText(currentLine + word).width;
                    if (width < maxWidth) {
                        currentLine += word;
                    } else {
                        lines.push(currentLine);
                        currentLine = word;
                    }
                }
                lines.push(currentLine);
                return lines;
            }

            // 繪製元件
            draw() {
                ctx.beginPath();
                if (this.type === 'TB') {
                    // TB為圓角矩形
                    const radius = 10; // 導角半徑
                    ctx.moveTo(this.x + radius, this.y);
                    ctx.lineTo(this.x + this.width - radius, this.y);
                    ctx.arcTo(this.x + this.width, this.y, this.x + this.width, this.y + radius, radius);
                    ctx.lineTo(this.x + this.width, this.y + this.height - radius);
                    ctx.arcTo(this.x + this.width, this.y + this.height, this.x + this.width - radius, this.y + this.height, radius);
                    ctx.lineTo(this.x + radius, this.y + this.height);
                    ctx.arcTo(this.x, this.y + this.height, this.x, this.y + this.height - radius, radius);
                    ctx.lineTo(this.x, this.y + radius);
                    ctx.arcTo(this.x, this.y, this.x + radius, this.y, radius);
                } else {
                    // PA為圓形
                    ctx.arc(this.x + this.width/2, this.y + this.height/2, this.height/2, 0, Math.PI * 2);
                }
                // 選中狀態特殊顯示
                if (selectedShapes.includes(this)) {
                    ctx.strokeStyle = '#FF3B30';
                    ctx.lineWidth = 4;
                    
                    // 繪製調整大小的控制點
                    const handleSize = 8;
                    ctx.fillStyle = '#FF3B30';
                    // 右下角
                    ctx.fillRect(this.x + this.width - handleSize/2, this.y + this.height - handleSize/2, handleSize, handleSize);
                    // 右邊中間
                    ctx.fillRect(this.x + this.width - handleSize/2, this.y + this.height/2 - handleSize/2, handleSize, handleSize);
                    // 下邊中間
                    ctx.fillRect(this.x + this.width/2 - handleSize/2, this.y + this.height - handleSize/2, handleSize, handleSize);
                } else {
                    ctx.strokeStyle = this.lineColor;
                    ctx.lineWidth = this.lineWidth;
                }
                if (this.type === 'TB') {
                    ctx.fillStyle = '#d3d3d3'; // 淺灰色 for TB
                } else {
                    ctx.fillStyle = '#ffffff'; // 白色 for PA
                }
                ctx.fill();
                ctx.stroke();

                // 繪製元件名稱
                if (this.name) {
                    ctx.fillStyle = '#000000';
                    ctx.font = `${this.textSize}px -apple-system, BlinkMacSystemFont`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    // 計算最大文字寬度
                    const maxWidth = this.type === 'TB' ? this.width * 0.9 : this.height * 0.9;
                    
                    // 獲取換行後的文字
                    const lines = this.wrapText(this.name, maxWidth);
                    
                    // 計算行高
                    const lineHeight = this.textSize * 1.2;
                    const totalHeight = lines.length * lineHeight;
                    
                    // 計算起始Y位置，使文字垂直置中
                    let y = this.y + (this.height - totalHeight) / 2 + lineHeight / 2;
                    
                    // 繪製每一行文字
                    lines.forEach(line => {
                        ctx.fillText(line, this.x + this.width/2, y);
                        y += lineHeight;
                    });
                }
            }

            // 檢查點是否在元件內
            isPointInside(x, y) {
                // 將滑鼠座標轉換為畫布座標系
                const canvasX = (x - offsetX) / scale;
                const canvasY = (y - offsetY) / scale;
                
                if (this.type === 'TB') {
                    // TB為矩形區域
                    return canvasX >= this.x && canvasX <= this.x + this.width &&
                           canvasY >= this.y && canvasY <= this.y + this.height;
                } else {
                    // PA為圓形區域
                    const centerX = this.x + this.width/2;
                    const centerY = this.y + this.height/2;
                    const radius = this.height/2;
                    const distance = Math.sqrt((canvasX - centerX) ** 2 + (canvasY - centerY) ** 2);
                    return distance <= radius;
                }
            }
            
            // 獲取該元件的位置說明
            getLocationDescription() {
                const currentDesignName = localStorage.getItem('currentDesignName');
                if (!currentDesignName) return null;
                const locationDesc = savedDesigns[currentGroup]?.[currentDesignName]?.locationDesc;
                if (!locationDesc) return null;
                // 尋找相關的位置說明
                for (const tbName in locationDesc) {
                    // 如果是TB箱本身
                    if (this.type === 'TB' && (this.name === tbName || tbName === 'TB' + this.name)) {
                        // 取得所有與此TB連接的TB
                        const connectedTBs = [];
                        connections.forEach(conn => {
                            if (conn.start === this && conn.end.type === 'TB') {
                                connectedTBs.push(conn.end.name);
                            } else if (conn.end === this && conn.start.type === 'TB') {
                                connectedTBs.push(conn.start.name);
                            }
                        });
                        // 優先檢查是否有無關聯PA的TB箱位置說明（使用'-'作為鍵）
                        if (locationDesc[tbName]['-']) {
                            return {
                                type: 'TB',
                                tbName: tbName,
                                tbLocation: locationDesc[tbName]['-'].tbLocation || '',
                                desc: locationDesc[tbName]['-'].desc || '',
                                connectedTBs: connectedTBs
                            };
                        }
                        // 如果沒有，則檢查所有與此TB相關的PA
                        for (const paName in locationDesc[tbName]) {
                            const desc = locationDesc[tbName][paName];
                            if (paName === '-' || paName === '') {
                                // 這是TB本身的說明
                                return {
                                    type: 'TB',
                                    tbName: tbName,
                                    tbLocation: desc.tbLocation || '',
                                    desc: desc.desc || '',
                                    connectedTBs: connectedTBs
                                };
                            }
                            // 如果有任何PA連接到這個TB，使用第一個找到的TB位置備註
                            if (desc.tbLocation) {
                                return {
                                    type: 'TB',
                                    tbName: tbName,
                                    tbLocation: desc.tbLocation || '',
                                    desc: '',
                                    connectedTBs: connectedTBs
                                };
                            }
                        }
                    }
                    
                    // 如果是PA
                    if (this.type === 'PA') {
                        for (const paName in locationDesc[tbName]) {
                            if (this.name === paName || paName === 'PA' + this.name) {
                                // 查找連接到這個PA的上一個PA
                                const connectedPAs = this.getConnectedPAs();
                                
                                return {
                                    type: 'PA',
                                    tbName: tbName,
                                    paName: paName,
                                    desc: locationDesc[tbName][paName].desc || '',
                                    tbLocation: locationDesc[tbName][paName].tbLocation || '',
                                    connectedPAs: connectedPAs
                                };
                            }
                        }
                    }
                }
                
                // 如果在位置說明中找不到，但是是PA型別，仍然回傳連接PA的資訊
                if (this.type === 'PA') {
                    const connectedPAs = this.getConnectedPAs();
                    if (connectedPAs.length > 0) {
                        return {
                            type: 'PA',
                            paName: this.name,
                            connectedPAs: connectedPAs
                        };
                    }
                }
                
                return null;
            }
            
            // 獲取與當前PA直接連接的所有上一個PA
            getConnectedPAs() {
                // 如果不是PA，返回空數組
                if (this.type !== 'PA') return [];
                
                const connectedPAs = [];
                
                // 查找所有以此PA為終點的連接
                connections.forEach(conn => {
                    // 如果連接的起點是PA，且終點是當前PA
                    if (conn.end === this && conn.start.type === 'PA') {
                        connectedPAs.push({
                            name: conn.start.name,
                            x: conn.start.x,
                            y: conn.start.y
                        });
                    }
                });
                
                return connectedPAs;
            }

            // 獲取調整大小控制點
            getResizeHandle(x, y) {
                if (!selectedShapes.includes(this)) return null;
                
                const handleSize = 8;
                const handles = [
                    { type: 'corner', x: this.x + this.width - handleSize/2, y: this.y + this.height - handleSize/2 },
                    { type: 'right', x: this.x + this.width - handleSize/2, y: this.y + this.height/2 - handleSize/2 },
                    { type: 'bottom', x: this.x + this.width/2 - handleSize/2, y: this.y + this.height - handleSize/2 }
                ];

                for (const handle of handles) {
                    if (x >= handle.x && x <= handle.x + handleSize &&
                        y >= handle.y && y <= handle.y + handleSize) {
                        return handle.type;
                    }
                }
                return null;
            }
        }

        // 繪製連接線
        function drawConnections() {
            // 繪製所有已確認的連接
            connections.forEach(conn => {
                ctx.beginPath();
                ctx.moveTo(conn.start.x + conn.start.width/2, conn.start.y + conn.start.height/2);
                ctx.lineTo(conn.end.x + conn.end.width/2, conn.end.y + conn.end.height/2);
                
                // 如果連線被選中，使用特殊樣式
                if (selectedConnections.includes(conn)) {
                    ctx.strokeStyle = '#FF3B30';
                    ctx.lineWidth = (conn.lineWidth || lineWidth) + 2;
                    // 繪製選中效果
                    ctx.setLineDash([5, 5]);
                } else {
                    ctx.strokeStyle = conn.lineColor || lineColor;
                    ctx.lineWidth = conn.lineWidth || lineWidth;
                    ctx.setLineDash([]);
                }
                ctx.stroke();
                ctx.setLineDash([]); // 重置虛線設定
            });

            // 繪製預覽連接線 - 當選中多個元件時
            if (selectedShapes.length >= 2) {
                ctx.beginPath();
                for (let i = 0; i < selectedShapes.length - 1; i++) {
                    const current = selectedShapes[i];
                    const next = selectedShapes[i + 1];
                    ctx.moveTo(current.x + current.width/2, current.y + current.height/2);
                    ctx.lineTo(next.x + next.width/2, next.y + next.height/2);
                }
                ctx.strokeStyle = '#FF3B30';
                ctx.lineWidth = 4;
                ctx.setLineDash([]);
                ctx.stroke();
            }
        }

        // 重繪整個畫布
        function redraw() {
            // 清除主畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 保存當前狀態，為繪製所有元件準備
            ctx.save();
            
            // 對所有元件（包括背景圖）應用縮放和位移
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            
            // 繪製背景圖
            if (bgImage) {
                if (!bgImage.hasOwnProperty('displayWidth')) {
                    // 初始化背景圖片的尺寸和位置
                    const scale = Math.min(canvas.width / bgImage.width, canvas.height / bgImage.height);
                    bgImage.displayWidth = bgImage.width * scale;
                    bgImage.displayHeight = bgImage.height * scale;
                    bgImage.x = (canvas.width - bgImage.displayWidth) / 2;
                    bgImage.y = (canvas.height - bgImage.displayHeight) / 2;
                    bgCacheDirty = true; // 初始化時標記緩存需更新
                }
                
                // 檢查並更新背景緩存（如果需要）
                updateBgCache();
                
                // 使用緩存的背景畫布
                ctx.globalAlpha = 1;
                ctx.drawImage(bgCanvas, 0, 0);

                // 繪製背景調整控制點
                if (!isDragging && !isResizing && !isResizingBg) {
                    drawBgResizeHandles();
                }
            }

            // 繪製可操作元件，確保在背景之上
            drawConnections();
            shapes.forEach(shape => shape.draw());
            
            // 恢復畫布狀態
            ctx.restore();
            
            // 繪製縮放比例指示器
            // 更新縮放百分比顯示
            document.getElementById('zoom-level').textContent = `${Math.round(scale * 100)}%`;
            
            // 保留原有的畫布縮放指示器（可選）
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(10, 10, 100, 25);
            ctx.fillStyle = '#ffffff';
            ctx.font = '14px -apple-system, BlinkMacSystemFont';
            ctx.fillText(`縮放: ${Math.round(scale * 100)}%`, 15, 28);
            ctx.restore();
        }

        // 初始化背景緩存
        function updateBgCache() {
            if (!bgImage || !bgCacheDirty) return false;
            
            // 調整背景畫布大小以匹配主畫布
            bgCanvas.width = canvas.width;
            bgCanvas.height = canvas.height;
            
            // 先在背景畫布上繪製白色背景
            bgCtx.fillStyle = '#ffffff';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            // 設置背景圖片的透明度
            bgCtx.globalAlpha = bgOpacity;
            
            // 保存當前狀態以應用旋轉
            bgCtx.save();
            
            // 移動到圖片中心點
            bgCtx.translate(bgImage.x + bgImage.displayWidth/2, bgImage.y + bgImage.displayHeight/2);
            
            // 應用旋轉
            bgCtx.rotate(bgRotation * Math.PI / 180);
            
            // 繪製圖片（從中心點偏移）
            bgCtx.drawImage(bgImage, -bgImage.displayWidth/2, -bgImage.displayHeight/2, bgImage.displayWidth, bgImage.displayHeight);
            
            // 恢復狀態
            bgCtx.restore();
            
            // 重置標記
            bgCacheDirty = false;
            return true;
        }

        // 新增TB箱按鈕事件
        document.getElementById('addTB').addEventListener('click', () => {
            const shape = new Shape('TB', canvas.width / 2, canvas.height / 2);
            shape.lineWidth = lineWidth;
            shape.lineColor = lineColor;
            saveState();
            shapes.push(shape);
            selectedShapes = [];
            redraw();
        }, { once: true });

        // 新增PA按鈕事件
        document.getElementById('addPA').addEventListener('click', () => {
            document.getElementById('add-pa-modal').style.display = 'flex';
            document.getElementById('pa-name-input').value = '';
            document.getElementById('pa-name-input').focus();
        });

        document.getElementById('cancel-add-pa').addEventListener('click', () => {
            document.getElementById('add-pa-modal').style.display = 'none';
        });

        document.getElementById('confirm-add-pa').addEventListener('click', () => {
            const paName = document.getElementById('pa-name-input').value.trim();
            if (paName) {
                const shape = new Shape('PA', canvas.width / 2, canvas.height / 2);
                shape.name = paName;
                shape.lineWidth = lineWidth;
                shape.lineColor = lineColor;
                saveState();
                shapes.push(shape);
                redraw();
            }
            document.getElementById('add-pa-modal').style.display = 'none';
        });

        document.getElementById('pa-name-input').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('confirm-add-pa').click();
            } else if (e.key === 'Escape') {
                document.getElementById('cancel-add-pa').click();
            }
        });

        canvas.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // 優先檢測可操作元件
            let hit = false;
            for (let i = shapes.length - 1; i >= 0; i--) {
                const shape = shapes[i];
                if (shape.isPointInside(x, y)) {
                    hit = true;
                    break;
                }
            }

            // 如果沒有點擊到任何元件且不是按住Shift鍵,則清除選擇
            if (!hit && !e.shiftKey) {
                selectedShapes = [];
                // 重置控制項為全局設定
                document.getElementById('line-width').value = lineWidth;
                document.getElementById('line-color').value = lineColor;
                redraw();
            }
        });

        document.getElementById('delete').addEventListener('click', () => {
            if (selectedShapes.length > 0) {
                saveState();
                // 檢查是否有選取的元件是 TB 或 PA
                const hasConnection = selectedShapes.length === 2 && connections.some(conn => 
                    (conn.start === selectedShapes[0] && conn.end === selectedShapes[1]) || 
                    (conn.start === selectedShapes[1] && conn.end === selectedShapes[0]));
                
                if (hasConnection) {
                    // 如果有連線，只刪除連線
                    connections = connections.filter(conn => 
                        !((conn.start === selectedShapes[0] && conn.end === selectedShapes[1]) || 
                          (conn.start === selectedShapes[1] && conn.end === selectedShapes[0])));
                } else {
                    // 刪除選取的元件及其相關的連線
                    selectedShapes.forEach(shape => {
                        const index = shapes.indexOf(shape);
                        if (index > -1) {
                            shapes.splice(index, 1);
                            // 同時刪除與此元件相關的所有連線
                            connections = connections.filter(conn => 
                                conn.start !== shape && conn.end !== shape);
                        }
                    });
                }
                selectedShapes = [];
                redraw();
            }
        });

        document.getElementById('confirm').addEventListener('click', () => {
            if (selectedShapes.length === 2) {
                saveState();
                // 新建連線時使用當前全局設定
                connections.push({
                    start: selectedShapes[0],
                    end: selectedShapes[1],
                    lineWidth: lineWidth,
                    lineColor: lineColor
                });
                selectedShapes = [];
                selectedConnections = [];
                redraw();
            }
        });

        document.getElementById('undo').addEventListener('click', () => {
            if (history.length > 0) {
                const previousState = history.pop();
                restoreState(previousState);
            }
        });

        document.getElementById('clear').addEventListener('click', () => {
            if (selectedShapes.length === 1) {
                saveState();
                const shape = selectedShapes[0];
                shape.name = '';
                redraw();
            }
        });

        document.getElementById('edit').addEventListener('click', () => {
            if (selectedShapes.length === 1) {
                const shape = selectedShapes[0];
                const container = document.querySelector('.name-input-container');
                const input = container.querySelector('.name-input');
                input.value = shape.name;
                container.style.display = 'block';
                container.style.left = (shape.x + canvas.offsetLeft) + 'px';
                container.style.top = (shape.y + canvas.offsetTop) + 'px';
                container.style.width = shape.width + 'px';
                input.focus();
                input.select();
                
                const handleInputChange = () => {
                    shape.name = input.value;
                    redraw();
                };

                const handleInputComplete = () => {
                    document.querySelector('.name-input-container').style.display = 'none';
                    redraw();
                };
                
                input.oninput = handleInputChange;
                input.onblur = handleInputComplete;
                input.onkeypress = (e) => {
                    if (e.key === 'Enter') {
                        handleInputComplete();
                    }
                }
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const currentTime = new Date().getTime();

            // 檢查是否點擊背景圖片的調整控制點或背景圖片本身
            if (bgImage) {
                // 將滑鼠座標轉換回原始座標系統
                const originalX = (x - offsetX) / scale;
                const originalY = (y - offsetY) / scale;
                
                const bgHandle = isPointInBgResizeHandle(x, y);
                if (bgHandle) {
                    isResizingBg = true;
                    bgResizeHandle = bgHandle;
                    bgResizeStartX = x;
                    bgResizeStartY = y;
                    bgStartWidth = bgImage.displayWidth;
                    bgStartHeight = bgImage.displayHeight;
                    bgStartX = bgImage.x;
                    bgStartY = bgImage.y;
                    return;
                } else if (x >= (bgImage.x * scale + offsetX) && 
                          x <= ((bgImage.x + bgImage.displayWidth) * scale + offsetX) &&
                          y >= (bgImage.y * scale + offsetY) && 
                          y <= ((bgImage.y + bgImage.displayHeight) * scale + offsetY)) {
                    // 只有在不是縮放或平移模式時，才允許拖動背景
                    if (!isPanning) {
                        isDraggingBg = true;
                        bgResizeStartX = x;
                        bgResizeStartY = y;
                        bgStartX = bgImage.x;
                        bgStartY = bgImage.y;
                        return;
                    }
                }
            }

            for (const shape of shapes) {
                if (shape.isPointInside(x, y)) {
                    if (currentTime - lastClickTime < 300) {
                        selectedShapes = [];
                        currentShape = shape;
                        const container = document.querySelector('.name-input-container');
                        const input = container.querySelector('.name-input');
                        input.value = shape.name;
                        container.style.display = 'block';
                        container.style.left = (shape.x + canvas.offsetLeft) + 'px';
                        container.style.top = (shape.y + canvas.offsetTop) + 'px';
                        container.style.width = shape.width + 'px';
                        input.focus();
                        input.select();
                        
                        const handleInputChange = () => {
                            shape.name = input.value;
                            redraw();
                        };

                        const handleInputComplete = () => {
                            document.querySelector('.name-input-container').style.display = 'none';
                            redraw();
                        };
                        
                        input.oninput = handleInputChange;
                        input.onblur = handleInputComplete;
                        input.onkeypress = (e) => {
                            if (e.key === 'Enter') {
                                handleInputComplete();
                            }
                        }
                    } else {
                        const handle = shape.getResizeHandle(x, y);
                        if (handle) {
                            isResizing = true;
                            currentShape = shape;
                            resizeHandle = handle;
                            dragOffsetX = x;
                            dragOffsetY = y;
                        } else {
                            isDragging = true;
                            currentShape = shape;
                            dragOffsetX = x - shape.x;
                            dragOffsetY = y - shape.y;
                            const shapeIndex = selectedShapes.indexOf(shape);
                            if (shapeIndex === -1) {
                                selectedShapes.push(shape);
                            } else {
                                selectedShapes.splice(shapeIndex, 1);
                            }
                        }
                        redraw();
                    }
                    break;
                }
            }
            lastClickTime = currentTime;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (isDraggingBg && bgImage) {
                const dx = x - bgResizeStartX;
                const dy = y - bgResizeStartY;
                
                // 直接移動背景圖片，不受縮放影響
                bgImage.x = bgStartX + dx;
                bgImage.y = bgStartY + dy;
                
                // 標記背景緩存需要更新
                bgCacheDirty = true;
                redraw();
                return;
            }

            if (isResizingBg && bgImage) {
                // 計算滑鼠移動的距離
                const dx = (x - bgResizeStartX) / scale;
                const dy = (y - bgResizeStartY) / scale;

                if (bgResizeHandle === 'corner') {
                    // 同時調整寬度和高度，不保持比例
                    const newWidth = bgStartWidth + dx;
                    const newHeight = bgStartHeight + dy;
                    bgImage.displayWidth = Math.max(50, newWidth);
                    bgImage.displayHeight = Math.max(50, newHeight);
                } else if (bgResizeHandle === 'right') {
                    // 只調整寬度
                    const newWidth = bgStartWidth + dx;
                    bgImage.displayWidth = Math.max(50, newWidth);
                } else if (bgResizeHandle === 'bottom') {
                    // 只調整高度
                    const newHeight = bgStartHeight + dy;
                    bgImage.displayHeight = Math.max(50, newHeight);
                } else if (bgResizeHandle === 'center') {
                    // 直接移動圖片位置，不改變大小
                    bgImage.x = bgStartX + dx;
                    bgImage.y = bgStartY + dy;
                }

                // 標記背景緩存需要更新
                bgCacheDirty = true;
                redraw();
                if (bgResizeHandle !== 'center') {
                    // 使用原始位置而不是強制居中
                    if (bgResizeHandle === 'right') {
                        // 調整右邊時，左側固定
                        bgImage.x = bgStartX;
                    } else if (bgResizeHandle === 'bottom') {
                        // 調整下方時，上方固定
                        bgImage.y = bgStartY;
                    } else if (bgResizeHandle === 'corner') {
                        // 調整角落時，可選擇保持左上角固定
                        bgImage.x = bgStartX;
                        bgImage.y = bgStartY;
                    }
                }
                
                // 標記背景緩存需要更新
                bgCacheDirty = true;
                
                // 調整時顯示尺寸提示
                ctx.save();
                redraw();
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(bgImage.x + 5, bgImage.y + 5, 180, 25);
                ctx.fillStyle = '#ffffff';
                ctx.font = '12px -apple-system, BlinkMacSystemFont';
                ctx.fillText(`${Math.round(bgImage.displayWidth)} × ${Math.round(bgImage.displayHeight)}`, bgImage.x + 10, bgImage.y + 20);
                ctx.restore();
                return;
            }

            if (isResizing && currentShape) {
                const dx = x - dragOffsetX;
                const dy = y - dragOffsetY;
                dragOffsetX = x;
                dragOffsetY = y;

                const maxSize = 200; // 設置最大尺寸限制
                const minSize = 20;  // 設置最小尺寸限制

                switch (resizeHandle) {
                    case 'corner':
                        const newWidth = Math.min(maxSize, Math.max(minSize, currentShape.width + dx));
                        const newHeight = Math.min(maxSize, Math.max(minSize, currentShape.height + dy));
                        currentShape.width = newWidth;
                        currentShape.height = newHeight;
                        break;
                    case 'right':
                        const newRightWidth = Math.min(maxSize, Math.max(minSize, currentShape.width + dx));
                        currentShape.width = newRightWidth;
                        break;
                    case 'bottom':
                        const newBottomHeight = Math.min(maxSize, Math.max(minSize, currentShape.height + dy));
                        currentShape.height = newBottomHeight;
                        break;
                }
                redraw();
            } else if (isDragging && currentShape) {
                currentShape.x = x - dragOffsetX;
                currentShape.y = y - dragOffsetY;
                redraw();
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (isResizingBg || isDraggingBg) {
                isResizingBg = false;
                isDraggingBg = false;
                bgResizeHandle = null;
                // 保存調整後的背景圖片狀態
                const bgState = {
                    displayWidth: bgImage.displayWidth,
                    displayHeight: bgImage.displayHeight,
                    x: bgImage.x,
                    y: bgImage.y
                };
                localStorage.setItem('bgState', JSON.stringify(bgState));
                
                // 標記背景緩存需要更新
                bgCacheDirty = true;
                redraw();
            }
            if (isResizing || isDragging) {
                saveState();
            }
            isDragging = false;
            isResizing = false;
            currentShape = null;
            resizeHandle = null;
        });

        redraw();

        // 同步位置說明表格的 input 值到 savedDesigns
        function syncLocationDescInputs() {
            const tableBody = document.getElementById('location-table-body');
            if (!tableBody) return;
            const rows = tableBody.querySelectorAll('tr');
            let currentDesignName = localStorage.getItem('currentDesignName');
            if (!currentDesignName) return;
            let locationDesc = {};
            if (savedDesigns[currentGroup][currentDesignName] && savedDesigns[currentGroup][currentDesignName].locationDesc) {
                locationDesc = savedDesigns[currentGroup][currentDesignName].locationDesc;
            }
            
            rows.forEach(row => {
                const tbName = row.querySelector('td:first-child').textContent;
                const paNameWithIndent = row.querySelector('td:nth-child(2)').textContent;
                const paName = paNameWithIndent.trimStart();
                const input = row.querySelector('td:nth-child(3) input');
                const tbLocationInput = row.querySelector('td:nth-child(4) input');
                
                if (!locationDesc[tbName]) {
                    locationDesc[tbName] = {};
                }
                
                // 初始化或更新位置說明資料
                if (!locationDesc[tbName][paName]) {
                    locationDesc[tbName][paName] = {
                        desc: '',
                        tbLocation: ''
                    };
                }
                
                // 更新位置說明
                if (input) {
                    locationDesc[tbName][paName].desc = input.value;
                }
                
                // 更新TB位置備註
                if (tbLocationInput) {
                    locationDesc[tbName][paName].tbLocation = tbLocationInput.value;
                }
            });
            
            // 寫回 savedDesigns
            if (savedDesigns[currentGroup][currentDesignName]) {
                savedDesigns[currentGroup][currentDesignName].locationDesc = locationDesc;
                localStorage.setItem(`savedDesigns_${currentGroup}`, JSON.stringify(savedDesigns[currentGroup]));
                
                // 如果當前有元件被懸停，更新提示框內容以反映新的位置說明
                if (currentHoveredShape) {
                    // 觸發滑鼠移動事件來更新提示框
                    const event = new MouseEvent('mousemove', {
                        clientX: parseInt(locationTooltip.style.left) - 15,
                        clientY: parseInt(locationTooltip.style.top) + 15,
                        bubbles: true
                    });
                    canvas.dispatchEvent(event);
                }
            }
        }

        // 修改大小調整滑桿的事件處理
        document.getElementById('shape-width').addEventListener('input', (e) => {
            const width = parseInt(e.target.value);
            if (selectedShapes.length > 0) {
                // 只調整選中的元件
                selectedShapes.forEach(shape => {
                    if (shape.type === 'TB') {
                        shape.width = width;
                    } else {
                        shape.width = width * 1.2; // PA寬度為TB的1.2倍
                    }
                });
            } else {
                // 調整所有元件
                shapes.forEach(shape => {
                    if (shape.type === 'TB') {
                        shape.width = width;
                    } else {
                        shape.width = width * 1.2;
                    }
                });
            }
            redraw();
        });

        document.getElementById('shape-height').addEventListener('input', (e) => {
            const height = parseInt(e.target.value);
            if (selectedShapes.length > 0) {
                // 只調整選中的元件
                selectedShapes.forEach(shape => {
                    if (shape.type === 'TB') {
                        shape.height = height;
                    } else {
                        shape.height = height * 0.8; // PA高度為TB的0.8倍
                    }
                });
            } else {
                // 調整所有元件
                shapes.forEach(shape => {
                    if (shape.type === 'TB') {
                        shape.height = height;
                    } else {
                        shape.height = height * 0.8;
                    }
                });
            }
            redraw();
        });

        // 當選擇形狀時更新滑桿的值
        canvas.addEventListener('mousedown', function(e) {
            // ... existing mousedown code ...
            
            // 更新滑桿的值
            if (selectedShapes.length === 1) {
                const shape = selectedShapes[0];
                document.getElementById('shape-width').value = shape.width;
                document.getElementById('shape-height').value = shape.height;
            }
        });

        // 滑鼠滾輪縮放事件
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            // 獲取滑鼠在畫布上的位置
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // 計算滑鼠在畫布座標系中的位置
            const canvasX = (mouseX - offsetX) / scale;
            const canvasY = (mouseY - offsetY) / scale;
            
            // 計算縮放比例變化
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            const newScale = scale * delta;
            
            // 限制縮放範圍
            if (newScale >= 0.1 && newScale <= 5) {
                // 更新縮放比例
                scale = newScale;
                
                // 調整位移以保持滑鼠位置不變
                offsetX = mouseX - canvasX * scale;
                offsetY = mouseY - canvasY * scale;
                
                redraw();
            }
        });

        // 滑鼠中鍵拖曳事件 - 只影響設計圖而不影響背景
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 1) { // 中鍵
                e.preventDefault();
                isPanning = true;
                lastPanX = e.clientX;
                lastPanY = e.clientY;
                canvas.style.cursor = 'grabbing';
                
                // 確保背景不受設計圖拖曳影響
                if (isDraggingBg) {
                    isDraggingBg = false;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isPanning) {
                const dx = e.clientX - lastPanX;
                const dy = e.clientY - lastPanY;
                
                // 只更新設計圖元素的偏移量，不影響背景
                offsetX += dx;
                offsetY += dy;
                
                lastPanX = e.clientX;
                lastPanY = e.clientY;
                
                redraw();
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (e.button === 1) {
                isPanning = false;
                canvas.style.cursor = 'default';
            }
        });

        canvas.addEventListener('mouseleave', () => {
            if (isPanning) {
                isPanning = false;
                canvas.style.cursor = 'default';
            }
        });

        // 重置縮放和位移
        function resetView() {
            scale = 1;
            offsetX = 0;
            offsetY = 0;
            redraw();
        }

        // 在視窗大小改變時重置視圖
        window.addEventListener('resize', () => {
            resizeCanvas();
            resetView();
        });

        redraw();

        // 工具列拖曳功能
        const toolbarDrag = {
            toolbar: document.querySelector('.toolbar'),
            isDragging: false,
            isResizing: false,
            currentX: 0,
            currentY: 0,
            initialX: 0,
            initialY: 0,
            xOffset: 0,
            yOffset: 0,
            initialWidth: 0,
            initialHeight: 0,
            currentScale: 1,
            lastClickTime: 0,
            isFirstMove: true,

            // 更新滑桿的事件處理
            updateSliderEvents() {
                const sliders = document.querySelectorAll('.vertical-slider');
                sliders.forEach(slider => {
                    // 移除現有的事件監聽器
                    slider.removeEventListener('input', this.handleSliderInput);
                    slider.removeEventListener('mousedown', this.handleSliderMouseDown);
                    
                    // 添加新的事件監聽器
                    slider.addEventListener('input', this.handleSliderInput);
                    slider.addEventListener('mousedown', this.handleSliderMouseDown);
                });
            },

            // 處理滑桿輸入
            handleSliderInput(e) {
                const value = parseFloat(e.target.value);
                const type = e.target.dataset.type;
                
                switch(type) {
                    case 'text-size':
                        if (selectedShapes.length > 0) {
                            selectedShapes.forEach(shape => {
                                shape.fontSize = value;
                            });
                        } else {
                            shapes.forEach(shape => {
                                shape.fontSize = value;
                            });
                        }
                        break;
                }
                redraw();
            },

            // 處理滑桿滑鼠按下事件
            handleSliderMouseDown(e) {
                // 防止事件冒泡到工具列的拖曳事件
                e.stopPropagation();
            },

            // 重置工具列位置和大小
            resetToolbar() {
                this.currentX = 0;
                this.currentY = 0;
                this.xOffset = 0;
                this.yOffset = 0;
                this.toolbar.style.width = '';
                this.toolbar.style.height = '';
                this.toolbar.style.transform = 'translateX(-50%)';
                this.toolbar.style.left = '50%';
                this.toolbar.style.bottom = '10px';
                this.currentScale = 1;
                this.toolbar.style.setProperty('--scale-factor', 1);
                this.isFirstMove = true;
            },

            // 自動調整工具列大小
            autoAdjustToolbar() {
                // 移除之前設置的寬度
                this.toolbar.style.width = '';
                // 讓工具列自動調整為內容寬度
                const contentWidth = Array.from(this.toolbar.children)
                    .reduce((total, child) => total + child.offsetWidth, 0);
                const padding = parseInt(getComputedStyle(this.toolbar).paddingLeft) +
                              parseInt(getComputedStyle(this.toolbar).paddingRight);
                const gap = parseInt(getComputedStyle(this.toolbar).gap) * (this.toolbar.children.length - 1);
                
                // 設置為內容寬度加上內邊距和間距，並縮小到原來的60%
                const adjustedWidth = (contentWidth + padding + gap) * 0.6;
                this.toolbar.style.width = `${adjustedWidth}px`;
                
                // 調整位置到最左邊，但不超出畫面
                this.toolbar.style.transform = 'none';
                this.toolbar.style.left = '20px';

                // 更新縮放比例
                this.currentScale = 0.6;
                this.toolbar.style.setProperty('--scale-factor', this.currentScale);
            },

            dragStart(e) {
                // 檢查是否是雙擊
                const currentTime = new Date().getTime();
                const timeDiff = currentTime - this.lastClickTime;
                this.lastClickTime = currentTime;

                if (timeDiff < 300) { // 300毫秒內的點擊視為雙擊
                    this.resetToolbar();
                    return;
                }

                // 檢查是否點擊到縮放控制點
                const rect = this.toolbar.getBoundingClientRect();
                const isRightResizeHandle = (
                    e.clientX > rect.right - 20 &&
                    e.clientY > rect.bottom - 20
                );
                const isLeftResizeHandle = (
                    e.clientX < rect.left + 20 &&
                    e.clientY > rect.bottom - 20
                );

                if (isRightResizeHandle || isLeftResizeHandle) {
                    this.isResizing = true;
                    this.resizeDirection = isRightResizeHandle ? 'right' : 'left';
                    this.initialWidth = this.toolbar.offsetWidth;
                    this.initialHeight = this.toolbar.offsetHeight;
                    this.toolbar.classList.add('resizing');
                } else {
                    // 檢查是否點擊到按鈕或滑桿
                    const isButton = e.target.tagName.toLowerCase() === 'button';
                    const isSlider = e.target.classList.contains('vertical-slider');
                    if (!isButton && !isSlider) {
                        this.isDragging = true;
                        
                        // 如果是第一次移動
                        if (this.isFirstMove) {
                            this.autoAdjustToolbar();
                            this.isFirstMove = false;
                        }
                    }
                }

                this.initialX = e.clientX - this.xOffset;
                this.initialY = e.clientY - this.yOffset;
            },

            drag(e) {
                if (this.isResizing) {
                    e.preventDefault();
                    let width;
                    if (this.resizeDirection === 'right') {
                        width = this.initialWidth + (e.clientX - (this.initialX + this.xOffset));
                    } else {
                        width = this.initialWidth - (e.clientX - (this.initialX + this.xOffset));
                    }
                    const height = this.initialHeight + (e.clientY - (this.initialY + this.yOffset));
                    
                    // 設置最小尺寸
                    const newWidth = Math.max(100, width);
                    const newHeight = Math.max(50, height);
                    
                    this.toolbar.style.width = newWidth + 'px';
                    this.toolbar.style.height = newHeight + 'px';

                    // 計算並更新縮放比例
                    this.currentScale = newWidth / this.initialWidth;
                    this.toolbar.style.setProperty('--scale-factor', this.currentScale);
                    
                    // 更新滑桿事件
                    this.updateSliderEvents();
                } else if (this.isDragging) {
                    e.preventDefault();
                    this.currentX = e.clientX - this.initialX;
                    this.currentY = e.clientY - this.initialY;

                    this.xOffset = this.currentX;
                    this.yOffset = this.currentY;

                    this.setTranslate(this.currentX, this.currentY, this.toolbar);
                }
            },

            dragEnd(e) {
                if (this.isResizing) {
                    this.toolbar.classList.remove('resizing');
                    this.isResizing = false;
                }
                
                this.initialX = this.currentX;
                this.initialY = this.currentY;
                this.isDragging = false;
            },

            setTranslate(xPos, yPos, el) {
                el.style.transform = `translate(${xPos}px, ${yPos}px)`;
            },

            init() {
                this.toolbar.addEventListener('mousedown', (e) => this.dragStart(e));
                document.addEventListener('mousemove', (e) => this.drag(e));
                document.addEventListener('mouseup', (e) => this.dragEnd(e));
            }
        };

        toolbarDrag.init();
    </script>
</body>
</html>
